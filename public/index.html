<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dólar Venezuela</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <header class="header">
      <h1>💵 Dólar Venezuela</h1>
      <span class="badge">● En vivo</span>
    </header>

    <div class="grid">

      <!-- TARJETA 1: Dólar BCV -->
      <div class="card">
        <div class="card-header">
          <span class="flag">🇺🇸</span>
          <h2>Dólar BCV</h2>
        </div>
        <p class="rate-label">1 USD =</p>
        <p class="rate-value" id="usd-rate">Cargando...</p>
        <hr>
        <div class="calculator">
          <label>Monto en USD</label>
          <input type="text" id="usd-input" value="0.00" placeholder="0.00">
          <p class="result">= <span id="usd-result">Bs. 0,00</span></p>
        </div>
      </div>

      <!-- TARJETA 2: Euro BCV -->
      <div class="card">
        <div class="card-header">
          <span class="flag">🇪🇺</span>
          <h2>Euro BCV</h2>
        </div>
        <p class="rate-label">1 EUR =</p>
        <p class="rate-value" id="eur-rate">Cargando...</p>
        <hr>
        <div class="calculator">
          <label>Monto en EUR</label>
          <input type="text" id="eur-input" value="0.00" placeholder="0.00">
          <p class="result">= <span id="eur-result">Bs. 0,00</span></p>
        </div>
      </div>

      <!-- TARJETA 3: Monitor Dólar -->
      <div class="card">
        <div class="card-header">
          <span class="flag">📊</span>
          <h2>Monitor Dólar</h2>
        </div>
        <p class="rate-label">1 USD =</p>
        <p class="rate-value" id="promedio-rate">Cargando...</p>
        <hr>
        <div class="calculator">
          <label>Monto en USD</label>
          <input type="text" id="promedio-input" value="0.00" placeholder="0.00">
          <p class="result">= <span id="promedio-result">Bs. 0,00</span></p>
        </div>
      </div>

      <!-- TARJETA 4: USDT Binance -->
      <div class="card">
        <div class="card-header">
          <span class="flag">💲</span>
          <h2>USDT Binance</h2>
        </div>
        <p class="rate-label">1 USDT =</p>
        <p class="rate-value" id="usdt-rate">Cargando...</p>
        <hr>
        <div class="calculator">
          <label>Monto en USDT</label>
          <input type="text" id="usdt-input" value="0.00" placeholder="0.00">
          <p class="result">= <span id="usdt-result">Bs. 0,00</span></p>
        </div>
      </div>

    </div>

    <footer>
      <p id="last-update">Última actualización: --</p>
    </footer>

  </div>

  <script src="main.js"></script>

</body>
</html>
